<style>
:root{
  --ink:#1E293B;
  --ink-2:#334155;
  --ivory:#F8F7FC;
  --paper:#FFFFFF;
  --gold:#7C3AED;
  --gold-dark:#6D28D9;
  --brick:#EC4899;
  --slate:#64748B;
  --charcoal:#0F172A;
  --line:#E9D5FF;
  --shadow: 0 4px 12px rgba(124,58,237,0.1);
  --accent-light:#F3E8FF;
  --accent-gradient: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%);
}
*{box-sizing:border-box;}
body{margin:0;}
.app{
  font-family:'Inter',sans-serif;
  color:var(--charcoal);
  background:var(--ivory);
  min-height:100vh;
  display:flex;
}
h1,h2,h3,.brand,.serif{font-family:'Fraunces',serif;}
.mono{font-family:'JetBrains Mono',monospace;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:196px;
  min-width:196px;
  background:var(--ink);
  color:#EDEBE3;
  display:flex;
  flex-direction:column;
  padding:20px 12px;
  position:sticky;
  top:0;
  height:100vh;
}
.brand{
  font-size:19px;
  font-weight:700;
  color:#fff;
  padding:0 8px 5px 8px;
  letter-spacing:0.3px;
  display:flex;
  align-items:center;
  gap:9px;
}
.brand img{width:30px; height:30px; border-radius:50%; object-fit:cover;}
.brand span{color:var(--gold);}
.brand-sub{
  font-size:10px;
  color:#9AA5C0;
  padding:0 8px 18px 8px;
  letter-spacing:0.5px;
  text-transform:uppercase;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:9px;
  padding:9px 12px;
  border-radius:9px;
  color:#C9CEDE;
  cursor:pointer;
  font-size:13.5px;
  font-weight:500;
  margin-bottom:2px;
  transition:background .15s, color .15s;
  border-left:3px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
.nav-item.active{background:rgba(228,167,59,0.14); color:#fff; border-left:3px solid var(--gold);}
.nav-icon{font-size:16px; width:18px; text-align:center;}
.sidebar-footer{
  margin-top:auto;
  padding:10px;
  font-size:11px;
  color:#7C87A6;
  line-height:1.5;
  border-top:1px solid rgba(255,255,255,0.08);
  padding-top:14px;
}
.sidebar-user{font-size:12px; color:#EDEBE3; margin-bottom:6px; word-break:break-all;}
.sidebar-signout{cursor:pointer; text-decoration:underline; color:#E8B968;}

/* ---------- Main ---------- */
.main{
  flex:1;
  padding:20px 28px;
  max-width:1200px;
}
.page-header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  margin-bottom:20px;
  flex-wrap:wrap;
  gap:12px;
}
.page-title{font-size:20px; font-weight:600; margin:0 0 3px 0;}
.page-sub{color:var(--slate); font-size:12px; margin:0;}
.btn{
  font-family:'Inter',sans-serif;
  border:none;
  border-radius:8px;
  padding:9px 16px;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:transform .08s, box-shadow .15s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent-gradient); color:#fff; box-shadow:0 4px 12px rgba(93,112,255,0.28);}
.btn-primary:hover{background:linear-gradient(135deg, var(--gold-dark), var(--gold-dark));}
.btn-ghost{background:transparent; color:var(--ink); border:1.5px solid var(--line);}
.btn-ghost:hover{border-color:var(--ink);}
.btn-danger{background:transparent; color:var(--brick); border:1.5px solid rgba(225,92,92,0.35);}
.btn-danger:hover{background:rgba(225,92,92,0.08);}
.btn-sm{padding:5px 11px; font-size:12px;}

/* ---------- Cards / grid ---------- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px;}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:box-shadow .2s, transform .2s;
}
.card:hover{box-shadow:0 8px 20px rgba(124,58,237,0.15); transform:translateY(-2px);}
.style-img{
  width:100%;
  height:200px;
  object-fit:contain;
  background:#F0F2FF;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#B0BAD1;
  font-size:12px;
}
.card-body{padding:12px 14px 14px 14px; flex:1; display:flex; flex-direction:column;}
.card-title{font-weight:600; font-size:14px; margin:0 0 3px 0;}
.card-desc{font-size:12px; color:var(--slate); margin:0 0 6px 0; line-height:1.5; flex:1;}
.card-cost{font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--ink); font-size:12.5px; margin-bottom:6px;}
.card-actions{display:flex; gap:6px;}

.empty-state{
  border:1.5px dashed var(--line);
  border-radius:12px;
  padding:42px 20px;
  text-align:center;
  color:var(--slate);
}
.empty-state .big{font-size:32px; margin-bottom:7px;}

/* ---------- Table ---------- */
table{width:100%; border-collapse:collapse; background:var(--paper); border-radius:12px; overflow:hidden; box-shadow:var(--shadow);}
th,td{padding:10px 14px; text-align:left; font-size:13px; border-bottom:1px solid var(--line);}
th{background:#F3F5FD; color:var(--ink); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:0.4px;}
tr:last-child td{border-bottom:none;}
td.mono{font-family:'JetBrains Mono',monospace;}

/* ---------- Modal ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(27,20,10,0.45);
  display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.overlay.show{display:flex;}
.modal{
  background:var(--paper); border-radius:14px; padding:22px;
  width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
  box-shadow:0 16px 46px rgba(20,18,50,0.22);
}
.modal.wide{max-width:720px;}
.modal h2{margin:0 0 12px 0; font-size:16px;}
.field{margin-bottom:13px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink); margin-bottom:5px;}
input[type=text], input[type=number], input[type=tel], input[type=date], input[type=email], input[type=password], input[type=url], textarea, select{
  width:100%; padding:9px 12px; border:1.5px solid var(--line); border-radius:10px;
  font-family:'Inter',sans-serif; font-size:13px; background:#fff; color:var(--charcoal); transition:border-color .2s;
}
textarea{resize:vertical; min-height:70px;}
input:focus, textarea:focus, select:focus{outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(93,112,255,0.1);}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.modal-actions{display:flex; justify-content:flex-end; gap:9px; margin-top:18px;}
.img-upload{
  border:1.5px dashed var(--line); border-radius:10px; padding:12px; text-align:center;
  cursor:pointer; color:var(--slate); font-size:12.5px; position:relative; overflow:hidden;
}
.img-upload img{max-height:300px; width:auto; border-radius:8px; margin-top:7px;}
.img-upload input{position:absolute; inset:0; opacity:0; cursor:pointer;}
.img-upload-row{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
.img-upload-row .img-upload{padding:10px;}
.img-upload-row .img-upload img{max-height:250px; width:auto;}

/* ---------- Invoice builder ---------- */
.inv-layout{display:grid; grid-template-columns:1fr 360px; gap:18px; align-items:start;}
@media (max-width:980px){.inv-layout{grid-template-columns:1fr;}}
.panel{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:16px; box-shadow:var(--shadow);}
.panel h3{margin:0 0 12px 0; font-size:14px; font-weight:600; color:var(--ink);}
.line-item{
  padding:10px 0; border-bottom:1px solid var(--line); font-size:12.5px;
}
.line-item:last-child{border-bottom:none;}
.line-item-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px;}
.line-item-name{font-weight:600; font-size:13.5px;}
.line-item-grid{
  display:flex; flex-wrap:wrap; gap:7px; align-items:flex-end;
}
.line-item-grid > div{flex:1 1 90px; min-width:80px;}
.line-item-grid label{display:block; font-size:9.5px; color:var(--slate); text-transform:uppercase; letter-spacing:0.3px; margin-bottom:3px;}
.line-item-grid input{padding:6px 8px; font-size:12.5px;}
.remove-x{cursor:pointer; color:var(--brick); font-weight:700; text-align:center; font-size:14px;}
.currency-toggle{display:flex; gap:6px; margin-bottom:12px;}
.currency-toggle button{
  flex:1; padding:7px; border-radius:8px; border:1.5px solid var(--line); background:#fff;
  cursor:pointer; font-size:12px; font-weight:600; color:var(--slate);
}
.currency-toggle button.active{border-color:var(--gold); background:rgba(108,99,255,0.12); color:var(--gold-dark);}
.type-toggle{display:flex; gap:6px; margin-bottom:12px;}
.type-toggle button{
  flex:1; padding:8px; border-radius:8px; border:1.5px solid var(--line); background:#fff;
  cursor:pointer; font-size:12.5px; font-weight:600; color:var(--slate);
}
.type-toggle button.active{border-color:var(--ink); background:var(--ink); color:#fff;}
.tag-row{display:flex; gap:6px; flex-wrap:wrap; margin:5px 0 9px 0;}
.tag{background:#F1EFFB; color:var(--ink); font-size:10.5px; padding:3px 8px; border-radius:6px; font-weight:500;}
.summary-row{display:flex; justify-content:space-between; padding:8px 0; font-size:13px; color:var(--ink);}
.summary-row.total{font-weight:700; font-size:17px; border-top:2px solid var(--ink); margin-top:10px; padding-top:12px; color:var(--ink);}
.badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:600;}
.badge-gold{background:rgba(108,99,255,0.14); color:var(--gold-dark);}
.badge-slate{background:rgba(102,107,133,0.12); color:var(--slate);}

/* ---------- Printable invoice ---------- */
.bill{
  background:var(--paper);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:0;
  overflow:hidden;
  position:relative;
}
.bill-torn{
  height:12px;
  background:repeating-linear-gradient(90deg, var(--ivory) 0 10px, transparent 10px 20px);
}
.bill-inner{padding:26px 30px;}
.bill-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--ink); padding-bottom:15px; margin-bottom:17px;}
.bill-biz-name{font-size:24px; font-weight:700; color:var(--ink); margin:0; letter-spacing:-0.5px;}
.bill-biz-meta{font-size:11px; color:var(--slate); margin-top:6px; line-height:1.7;}
.bill-stamp{
  width:70px; height:70px; border-radius:50%; border:3px solid var(--gold);
  display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif;
  font-size:28px; font-weight:700; color:var(--gold-dark); flex-shrink:0; overflow:hidden; background:var(--ivory);
}
.bill-stamp img{width:100%; height:100%; object-fit:cover;}
.bill-meta-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; font-size:12.5px;}
.bill-meta-grid .lbl{color:var(--slate); font-size:10px; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px; font-weight:600;}
.bill-meta-grid > div:first-child{border-right:1px solid var(--slate); padding-right:20px;}
.bill table{box-shadow:none;}
.bill th{background:var(--ink); color:var(--paper); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px;}
.bill td{font-size:12.5px; padding:10px 8px;}
.bill-totals{margin-left:auto; width:280px; margin-top:16px; background:var(--ivory); padding:12px; border-radius:6px;}

@media print{
  .sidebar, .page-header .btn, .no-print{display:none !important;}
  .app{display:block;}
  .main{padding:0; max-width:100%;}
  body{background:#fff;}
  .bill{box-shadow:none; border:none;}
}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:#D9CFAF; border-radius:8px;}

/* ---------- Login / Setup / Loading screens ---------- */
.center-screen{
  position:fixed; inset:0; background:var(--ink);
  display:flex; align-items:center; justify-content:center; padding:20px; z-index:200;
}
.center-box{
  background:var(--paper); border-radius:16px; padding:36px 34px; width:100%; max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}
.center-box.wide{max-width:640px;}
.center-stamp{
  width:56px; height:56px; border-radius:50%; border:2px solid var(--gold); margin:0 auto 16px auto;
  display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif;
  font-size:22px; font-weight:700; color:var(--gold-dark); overflow:hidden;
}
.center-stamp img{width:100%; height:100%; object-fit:cover;}
.center-box h2{margin:0 0 6px 0; font-size:19px; text-align:center;}
.center-box p{margin:0 0 18px 0; font-size:13px; color:var(--slate); text-align:center;}
.form-error{color:var(--brick); font-size:12.5px; margin-top:8px; min-height:16px; text-align:center;}
.setup-steps{font-size:13px; line-height:1.7; color:var(--charcoal); text-align:left;}
.setup-steps code{background:#F3EEE1; padding:2px 6px; border-radius:5px; font-family:'JetBrains Mono',monospace; font-size:12px;}
.setup-steps pre{background:#F3EEE1; padding:12px; border-radius:8px; overflow-x:auto; font-size:12px; font-family:'JetBrains Mono',monospace;}
.spinner{
  width:32px; height:32px; border:3px solid rgba(255,255,255,0.25); border-top-color:var(--gold);
  border-radius:50%; margin:0 auto 16px auto; animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- Mobile responsive ---------- */
.mobile-topbar{display:none;}
.sidebar-backdrop{display:none;}
@media (max-width: 860px){
  .mobile-topbar{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    background:var(--ink); color:#fff; padding:12px 16px;
    position:sticky; top:0; z-index:150;
  }
  .mobile-topbar .brand{padding:0; margin:0; font-size:19px;}
  .mobile-topbar img{width:30px; height:30px; border-radius:50%; object-fit:cover;}
  .hamburger-btn{
    background:none; border:none; color:#fff; font-size:24px; cursor:pointer;
    padding:2px 6px; line-height:1; border-radius:6px;
  }
  .hamburger-btn:active{background:rgba(255,255,255,0.1);}
  .app{flex-direction:column;}
  .sidebar{
    position:fixed; top:0; left:0; height:100vh; width:250px;
    transform:translateX(-100%); transition:transform .25s ease; z-index:300;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-backdrop{
    display:block; position:fixed; inset:0; background:rgba(20,15,5,0.45);
    z-index:250; opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sidebar-backdrop.show{opacity:1; pointer-events:auto;}
  .main{padding:20px 16px;}
  .inv-layout{grid-template-columns:1fr;}
  .line-item-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width: 480px){
  .page-title{font-size:20px;}
  .page-sub{font-size:12.5px;}
  .brand{font-size:17px;}
  .mobile-topbar .brand{font-size:16px;}
  .btn{padding:8px 13px; font-size:13px;}
  .btn-sm{padding:5px 10px; font-size:11.5px;}
  .card-title{font-size:14px;}
  .card-desc{font-size:12px;}
  .card-cost{font-size:14px;}
  .card-body{padding:12px;}
  .style-img{height:160px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;}
  .panel{padding:14px;}
  .modal{padding:18px; max-width:100%;}
  .modal h2{font-size:17px;}
  .field-row{grid-template-columns:1fr;}
  .field label{font-size:11.5px;}
  input[type=text], input[type=number], input[type=tel], input[type=date], input[type=email], input[type=password], textarea, select{
    padding:8px 10px; font-size:13.5px;
  }
  .line-item-grid{grid-template-columns:1fr 1fr;}
  .line-item-name{font-size:13px;}
  table{font-size:12px;}
  th,td{padding:9px 10px; font-size:12px;}
  .type-toggle button, .currency-toggle button{font-size:11.5px; padding:7px 4px;}
  .center-box{padding:26px 22px; max-width:92vw;}
  .center-box h2{font-size:17px;}
  .bill-inner{padding:20px 16px;}
  .bill-biz-name{font-size:19px;}
  .bill-stamp{width:50px; height:50px;}
  .bill-meta-grid{grid-template-columns:1fr; gap:10px;}
  .bill-totals{width:100%;}
  .summary-row.total{font-size:15px;}
}
@media print{
  .mobile-topbar, .sidebar-backdrop{display:none !important;}
}
</style>

/* ============================= HELPERS ============================= */
function escapeHTML(s){
  return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function fmtINR(n){
  n = Number(n)||0;
  return '₹' + n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtUSD(n){
  n = Number(n)||0;
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function itemUSDRate(it, usdRate){
  return (it.rateUSD!==undefined && it.rateUSD!=='' && it.rateUSD!=null) ? Number(it.rateUSD) : (it.rate/(usdRate||83));
}
function styleTotalCost(s){
  return (Number(s.cost)||0) + (Number(s.packingCost)||0) + (Number(s.shippingCost)||0) + (Number(s.otherCost)||0);
}
function styleTotalCostUSD(s, usdRate){
  const rate = usdRate||83;
  const comp = (inrVal, usdVal) => (usdVal!==undefined && usdVal!=='' && usdVal!=null) ? Number(usdVal) : (Number(inrVal)||0)/rate;
  return comp(s.cost, s.costUSD) + comp(s.packingCost, s.packingCostUSD) + comp(s.shippingCost, s.shippingCostUSD) + comp(s.otherCost, s.otherCostUSD);
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

const INDIAN_STATES = ["Andhra Pradesh","Arunachal Pradesh","Assam","Bihar","Chhattisgarh","Delhi","Goa","Gujarat","Haryana","Himachal Pradesh","Jharkhand","Karnataka","Kerala","Madhya Pradesh","Maharashtra","Manipur","Meghalaya","Mizoram","Nagaland","Odisha","Punjab","Rajasthan","Sikkim","Tamil Nadu","Telangana","Tripura","Uttar Pradesh","Uttarakhand","West Bengal","Jammu and Kashmir","Ladakh","Puducherry","Chandigarh"];

const USA_STATES = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];

const UK_REGIONS = ["England","Scotland","Wales","Northern Ireland"];

const UAE_EMIRATES = ["Abu Dhabi","Ajman","Dubai","Fujairah","Ras Al Khaimah","Sharjah","Umm Al Quwain"];

const AUSTRALIA_STATES = ["New South Wales","Queensland","South Australia","Tasmania","Victoria","Western Australia","Australian Capital Territory","Northern Territory"];

const CANADA_PROVINCES = ["Alberta","British Columbia","Manitoba","New Brunswick","Newfoundland and Labrador","Northwest Territories","Nova Scotia","Nunavut","Ontario","Prince Edward Island","Quebec","Saskatchewan","Yukon"];

const SINGAPORE_REGIONS = ["Central Region","East Region","North Region","Northeast Region","West Region"];

function getStatesByCountry(country){
  switch(country){
    case 'India': return INDIAN_STATES;
    case 'United States': return USA_STATES;
    case 'United Kingdom': return UK_REGIONS;
    case 'United Arab Emirates': return UAE_EMIRATES;
    case 'Australia': return AUSTRALIA_STATES;
    case 'Canada': return CANADA_PROVINCES;
    case 'Singapore': return SINGAPORE_REGIONS;
    default: return [];
  }
}
const SIZE_OPTIONS = ['XS','S','M','L','XL','XXL','Custom','20','22','24','26','28','30','32','34','36','38','40'];
function sizeOptionsHTML(currentVal){
  const hasCustomVal = currentVal && !SIZE_OPTIONS.includes(currentVal);
  return `<option value="">--</option>` +
    (hasCustomVal? `<option value="${escapeHTML(currentVal)}" selected>${escapeHTML(currentVal)}</option>` : '') +

const defaultSettings = {
  bizName:'Corset Vogue Studio',
  bizAddress:'',
  bizPhone:'',
  bizEmail:'',
  bizGSTIN:'',
  bizState:'Delhi',
  gstRate:5,
  invoicePrefix:'INV',
  nextInvoiceNo:1,
  bankDetails:'',
  logo:'',
  usdRate:83,
  tailorGroupLink:''
};

/* ============================= IN-MEMORY CACHE (synced from Firestore) ============================= */
let DB = {
  settings: JSON.parse(JSON.stringify(defaultSettings)),
  styles: [],
  clients: [],
  invoices: [],
  tailors: [],
  challans: [],
  vendors: []
};
let currentUser = null;
let currentUserRole = 'admin'; // 'admin' or 'tailor'
let currentTailorId = null;
let listenersActive = false;
let unsubscribers = [];
let loadedFlags = { settings:false, styles:false, clients:false, invoices:false, tailors:false, challans:false, vendors:false };

function allLoaded(){
  return loadedFlags.settings && loadedFlags.styles && loadedFlags.clients && loadedFlags.invoices && loadedFlags.tailors && loadedFlags.challans && loadedFlags.vendors;
}

function attachListeners(){
  if(listenersActive) return;
  listenersActive = true;
  loadedFlags = { settings:false, styles:false, clients:false, invoices:false, tailors:false };

  unsubscribers.push(db.collection('meta').doc('settings').onSnapshot(doc=>{
    DB.settings = Object.assign(JSON.parse(JSON.stringify(defaultSettings)), doc.exists ? doc.data() : {});
    loadedFlags.settings = true;
    afterSync();
  }, err=>{ console.error(err); loadedFlags.settings = true; afterSync(); }));

  unsubscribers.push(db.collection('styles').onSnapshot(snap=>{
    DB.styles = snap.docs.map(d=>({id:d.id, ...d.data()}));
    loadedFlags.styles = true;
    afterSync();
  }, err=>{ console.error(err); loadedFlags.styles = true; afterSync(); }));

  unsubscribers.push(db.collection('clients').onSnapshot(snap=>{
    DB.clients = snap.docs.map(d=>({id:d.id, ...d.data()}));
    loadedFlags.clients = true;
    afterSync();
  }, err=>{ console.error(err); loadedFlags.clients = true; afterSync(); }));

  unsubscribers.push(db.collection('invoices').onSnapshot(snap=>{
    DB.invoices = snap.docs.map(d=>({id:d.id, ...d.data()}));
    loadedFlags.invoices = true;
    afterSync();
  }, err=>{ console.error(err); loadedFlags.invoices = true; afterSync(); }));

  unsubscribers.push(db.collection('tailors').onSnapshot(snap=>{
    DB.tailors = snap.docs.map(d=>({id:d.id, ...d.data()}));
    loadedFlags.tailors = true;
    afterSync();
  }, err=>{ console.error(err); loadedFlags.tailors = true; afterSync(); }));

  unsubscribers.push(db.collection('challans').onSnapshot(snap=>{
    DB.challans = snap.docs.map(d=>({id:d.id, ...d.data()}));
    loadedFlags.challans = true;
    afterSync();
  }, err=>{ console.error(err); loadedFlags.challans = true; afterSync(); }));

  unsubscribers.push(db.collection('vendors').onSnapshot(snap=>{
    DB.vendors = snap.docs.map(d=>({id:d.id, ...d.data()}));
    loadedFlags.vendors = true;
    afterSync();
  }, err=>{ console.error(err); loadedFlags.vendors = true; afterSync(); }));
}
function detachListeners(){
  unsubscribers.forEach(u=>{ try{ u(); }catch(e){} });
  unsubscribers = [];
  listenersActive = false;
}
function afterSync(){
  if(allLoaded()){
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('appRoot').style.display='flex';
    render();
  }
}

/* ============================= AUTH ============================= */
function showSetupScreen(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appRoot').style.display='none';
  const el = document.getElementById('setupScreen');
  el.style.display='flex';
  el.innerHTML = `
    <div class="center-box wide">
      <h2>One-time Setup Needed</h2>
      <p>Firebase config abhi tak file mein daali nahi gayi hai. Ye steps follow karein:</p>
      <div class="setup-steps">
        1. <b>console.firebase.google.com</b> pe jaakar naya project banayein.<br>
        2. Project ke andar <b>Build → Authentication → Get Started → Email/Password</b> enable karein.<br>
        3. <b>Build → Firestore Database → Create database</b> (Production mode, region: asia-south1 ya nearest).<br>
        4. Firestore &rarr; <b>Rules</b> tab mein ye paste karke Publish karein:
        <pre>rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}</pre>
        5. Project Settings (gear icon) &rarr; scroll to <b>Your apps</b> &rarr; click Web icon (&lt;/&gt;) &rarr; register app &rarr; copy the <code>firebaseConfig</code> object.<br>
        6. Is HTML file ko text editor mein kholein, <code>firebaseConfig</code> section dhundhein, apne values paste karein.<br>
        7. <b>Authentication &rarr; Users &rarr; Add user</b> se apne staff members ke email/password add karein — wahi unka login hoga.<br>
        8. File ko save karke apni hosting/domain pe upload kar dein.
      </div>
    </div>
  `;
}

function showLoginScreen(error){
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appRoot').style.display='none';
  const el = document.getElementById('loginScreen');
  el.style.display='flex';
  el.innerHTML = `
    <div class="center-box">
      <div class="center-stamp"><img src="${LOGO_DATA_URL}" alt="logo"></div>
      <h2>Corset Vogue Studio</h2>
      <p>Admin Login</p>
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@studio.com"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
      <div class="form-error" id="loginError">${error||''}</div>
      <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="attemptLogin()">Sign In</button>
      <p style="margin-top:14px; font-size:12.5px; text-align:center;">
        <span style="cursor:pointer; text-decoration:underline; color:var(--gold-dark);" onclick="showForgotPasswordScreen()">Password bhool gaye?</span>
      </p>
      <p style="margin-top:10px; font-size:11.5px;">Naya staff account chahiye? Studio owner se poochein — wo Firebase Console se add karte hain.</p>
    </div>
  `;
  document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') attemptLogin(); });
}

function showForgotPasswordScreen(message, isError){
  const el = document.getElementById('loginScreen');
  el.innerHTML = `
    <div class="center-box">
      <div class="center-stamp"><img src="${LOGO_DATA_URL}" alt="logo"></div>
      <h2>Password Reset</h2>
      <p>Apna login email daaliye — hum reset link bhej denge</p>
      <div class="field"><label>Email</label><input type="email" id="resetEmail" placeholder="you@studio.com"></div>
      <div class="form-error" style="color:${isError?'var(--brick)':'var(--gold-dark)'};">${message||''}</div>
      <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="sendPasswordReset()">Send Reset Link</button>
      <p style="margin-top:14px; font-size:12.5px; text-align:center;">
        <span style="cursor:pointer; text-decoration:underline;" onclick="showLoginScreen()">← Wapas Sign In pe jaayein</span>
      </p>
    </div>
  `;

function sendPasswordReset(){

/* ============================= DASHBOARD ANALYTICS HELPERS ============================= */
function getMonthlyRevenue(invoices, monthsCount){
  const now = new Date();
  const buckets = [];
  for(let i=monthsCount-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    buckets.push({ year:d.getFullYear(), month:d.getMonth(), label:d.toLocaleString('en-US',{month:'short'})+' '+String(d.getFullYear()).slice(2), total:0 });
  }
  invoices.forEach(inv=>{
    const dt = new Date(inv.date);
    if(isNaN(dt)) return;
    const b = buckets.find(x=>x.year===dt.getFullYear() && x.month===dt.getMonth());
    if(b) b.total += (inv.total||0);
  });
  return buckets;
}
function renderMonthlyChartSVG(buckets){
  const maxVal = Math.max(...buckets.map(b=>b.total), 1);
  const w = 600, chartH = 120, baseY = 145, barW = 56;
  const gap = (w - buckets.length*barW) / (buckets.length+1);
  let bars = '';
  buckets.forEach((b,i)=>{
    const x = gap + i*(barW+gap);
    const barH = maxVal>0 ? (b.total/maxVal)*chartH : 0;
    const y = baseY - barH;
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(barH,2)}" rx="6" fill="#E4A73B"></rect>`;
    bars += `<text x="${x+barW/2}" y="${y-8}" text-anchor="middle" font-size="11" fill="#1B2A4A" font-family="JetBrains Mono, monospace">${b.total? '₹'+Math.round(b.total).toLocaleString('en-IN') : ''}</text>`;
    bars += `<text x="${x+barW/2}" y="${baseY+18}" text-anchor="middle" font-size="11.5" fill="#5B6478">${b.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} 170" style="width:100%; height:auto; max-width:100%;">${bars}</svg>`;
}
function getTopStyles(invoices, limit){
  const map = {};
  invoices.forEach(inv=>{
    (inv.items||[]).forEach(it=>{
      map[it.name] = (map[it.name]||0) + (it.qty*it.rate);
    });
  });
  return Object.entries(map).map(([name,total])=>({name,total})).sort((a,b)=>b.total-a.total).slice(0,limit);
}
function getTopClients(invoices, limit){
  const map = {};
  invoices.forEach(inv=>{
    map[inv.clientName] = (map[inv.clientName]||0) + (inv.total||0);
  });
  return Object.entries(map).map(([name,total])=>({name,total})).sort((a,b)=>b.total-a.total).slice(0,limit);
}
function renderBarList(data){
  if(!data.length) return `<div style="color:var(--slate); font-size:13px; padding:10px 0;">Abhi data nahi hai.</div>`;
  const maxVal = Math.max(...data.map(d=>d.total), 1);
  return data.map(d=>`
    <div style="margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px;">
        <span>${escapeHTML(d.name)}</span><span class="mono">${fmtINR(d.total)}</span>
      </div>
      <div style="background:#EFE9DA; border-radius:6px; height:8px; overflow:hidden;">
        <div style="background:var(--gold); height:100%; width:${(d.total/maxVal)*100}%;"></div>
      </div>
    </div>
  `).join('');
}

function handleImagePreview(ev, inputId='f_image1', previewId='imgPreview1'){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const maxW = 640;
      const scale = Math.min(1, maxW/img.width);
      canvas.width = img.width*scale;
      canvas.height = img.height*scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      document.getElementById(previewId).src = dataUrl;
      document.getElementById(previewId).style.display = 'block';
      document.getElementById('imgPreviewText' + previewId.slice(-1)).textContent = 'Change image';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function fetchImageFromURL(){
  const urlInput = document.getElementById('f_imageurl');
  const url = urlInput.value.trim();
  if(!url){
    alert('Image URL daaliye');
    return;
  }
  const img = new Image();
  img.crossOrigin = 'Anonymous';
  img.onload = function(){
    const canvas = document.createElement('canvas');
    const maxW = 640;
    const scale = Math.min(1, maxW/img.width);
    canvas.width = img.width*scale;
    canvas.height = img.height*scale;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    let preview = document.getElementById('urlPreview');
    if(!preview){
      preview = document.createElement('img');
      preview.id = 'urlPreview';
      preview.style.marginTop = '8px';
      preview.style.maxWidth = '100%';
      preview.style.maxHeight = '200px';
      preview.style.borderRadius = '6px';
      urlInput.parentElement.appendChild(preview);
    }
    preview.src = dataUrl;
    preview.style.display = 'block';
  };
  img.onerror = function(){
    alert('Image load nahi ho saka. Check URL aur CORS settings.');
  };
  img.src = url;
}

function shareOnWhatsApp(invId){
  const inv = DB.invoices.find(i=>i.id===invId);
  if(!inv) return;
  const client = inv.clientSnapshot;
  const showINR = (inv.currencyMode||'INR')!=='USD';
  const showUSD = (inv.currencyMode||'INR')!=='INR';
  const totalStr = (showINR?fmtINR(inv.total):'') + (showINR&&showUSD?' / ':'') + (showUSD?fmtUSD(inv.totalUSD!==undefined?inv.totalUSD:inv.total/(inv.usdRate||83)):'');
  let msg = `Namaste ${client.name},\n\n${inv.bizSnapshot.bizName} se Invoice ${inv.number} (${inv.date}):\n\n`;
  inv.items.forEach(it=>{
    msg += `• ${it.name} x${it.qty} = ${fmtINR(it.qty*it.rate)}\n`;
  });
  msg += `\nTotal: ${totalStr}`;
  if(inv.advanceReceived){
    msg += `\nAdvance Received: ${fmtINR(inv.advanceReceived)}`;
    msg += `\nBalance Due: ${fmtINR(inv.balanceDue!==undefined?inv.balanceDue:inv.total-inv.advanceReceived)}`;
  }
  msg += `\n\nDhanyavaad!`;
  const phoneDigits = (client.phone||'').replace(/[^0-9]/g,'');
  const phone = phoneDigits? (phoneDigits.length<=10? '91'+phoneDigits : phoneDigits) : '';
  const url = phone
    ? `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`
    : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

  const shippingCharge = st.currencyMode==='USD' ? (Number(st.shippingChargeUSD)||0) : (Number(st.shippingCharge)||0);
  const otherCharge = st.currencyMode==='USD' ? (Number(st.otherChargeUSD)||0) : (Number(st.otherCharge)||0);
  const advanceReceived = st.currencyMode==='USD' ? (Number(st.advanceReceivedUSD)||0) : (Number(st.advanceReceived)||0);
  const subtotal = itemsSubtotal - discount + shippingCharge + otherCharge;
  const discountUSD = st.currencyMode==='USD' ? discount : (discount/st.usdRate);
  const shippingChargeUSD = st.currencyMode==='USD' ? shippingCharge : (shippingCharge/st.usdRate);
  const otherChargeUSD = st.currencyMode==='USD' ? otherCharge : (otherCharge/st.usdRate);
  const advanceReceivedUSD = st.currencyMode==='USD' ? advanceReceived : (advanceReceived/st.usdRate);
  const subtotalUSD = itemsSubtotalUSD - discountUSD + shippingChargeUSD + otherChargeUSD;
  const gstApplicable = st.currencyMode!=='USD';
  const gstAmt = gstApplicable ? subtotal * (st.gstRate/100) : 0;
  const total = subtotal + gstAmt;
  const gstAmtUSD = gstApplicable ? subtotalUSD * (st.gstRate/100) : 0;
  const totalUSD = subtotalUSD + gstAmtUSD;
  const balanceDue = total - advanceReceived;
  const balanceDueUSD = totalUSD - advanceReceivedUSD;
  const codeLabel = st.invoiceType==='service' ? 'SAC' : 'HSN';
  const showINR = st.currencyMode!=='USD';
  const showUSD = st.currencyMode!=='INR';

  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">New Invoice</h1>
        <p class="page-sub">Client chunein, styles add karein, GST auto-calculate hoga</p>
      </div>
    </div>
    <div class="inv-layout">
      <div class="panel">
        <h3>Invoice Type</h3>
        <div class="type-toggle">
          <button class="${st.invoiceType==='goods'?'active':''}" onclick="setInvoiceType('goods')">🧵 Goods (HSN)</button>
          <button class="${st.invoiceType==='service'?'active':''}" onclick="setInvoiceType('service')">✎ Service (SAC)</button>
        </div>

        <h3>Bill To</h3>
        <div class="field-row" style="margin-bottom:16px;">
          <div class="field">
            <label>Client</label>
            <select onchange="updateInvClient(this.value)">
              ${DB.clients.map(c=>`<option value="${c.id}" ${c.id===st.clientId?'selected':''}>${escapeHTML(c.name)}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Invoice Date</label>
            <input type="date" value="${st.date}" onchange="newInvoiceState.date=this.value">
          </div>
        </div>
        <div class="field" style="margin-bottom:16px;">
          <label>Order No. (client's PO/reference)</label>
          <input type="text" value="${escapeHTML(st.orderNo||'')}" placeholder="${st.orderType==='regular'?'Required':'Optional'}" onchange="newInvoiceState.orderNo=this.value" ${st.orderType==='regular'?'':'style="opacity:0.7;"'}>
        </div>
        <div class="field-row" style="margin-bottom:16px;">
          <div class="field">
            <label>Order Type</label>
            <select onchange="newInvoiceState.orderType=this.value; render();">
              <option value="regular" ${st.orderType==='regular'?'selected':''}>Regular Order</option>
              <option value="promotional" ${st.orderType==='promotional'?'selected':''}>Promotional</option>
              <option value="gift" ${st.orderType==='gift'?'selected':''}>Gift</option>
            </select>
          </div>
          <div class="field">
            <label>Assign to Tailor</label>
            <select onchange="newInvoiceState.assignedTailorId=this.value; render();">
              <option value="">-- No Assignment --</option>
              ${DB.tailors.map(t=>`<option value="${t.id}" ${st.assignedTailorId===t.id?'selected':''}>${escapeHTML(t.name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="font-size:12.5px; color:var(--slate); margin-bottom:16px;">
          <span class="badge ${sameState?'badge-gold':'badge-slate'}">${isExport? '🌍 Export Invoice (Outside India) → IGST' : (sameState? 'Same State → CGST + SGST' : 'Different State → IGST')}</span>
          ${isExport? `<div style="margin-top:6px; font-size:11.5px;">Export ke liye GST treatment (0%/LUT/with tax) apne CA se confirm kar lein.</div>`:''}
        </div>

        <h3>Items</h3>
        <div class="field" style="display:flex; gap:8px; margin-bottom:10px;">
          <select id="stylePicker" style="flex:1;">
            <option value="">-- Select a style to add --</option>
            ${DB.styles.filter(s=>!s.clientId || s.clientId===st.clientId).map(s=>`<option value="${s.id}">${escapeHTML(s.name)} (${fmtINR(styleTotalCost(s))})</option>`).join('')}
          </select>
          <button class="btn btn-ghost" onclick="addInvoiceItem()">Add</button>
          <button class="btn btn-ghost" onclick="addManualInvoiceItem()">+ Manual Entry</button>
        </div>
        <div style="font-size:11.5px; color:var(--slate); margin:-4px 0 10px 0;">Sirf is client ki styles aur General Catalog wali styles dikh rahi hain. Ya phir "+ Manual Entry" se koi bhi item bina catalog ke seedha type kar ke add karein.</div>
        <div id="lineItems">
          ${st.items.length? st.items.map((it,idx)=>`
            <div class="line-item">
              <div class="line-item-top">
                <input type="text" class="line-item-name" style="font-weight:700; font-size:14px; border:1px solid #E9D5FF; background:#F3E8FF; padding:6px 8px; border-radius:6px; flex:1; margin-right:8px; min-width:100px; color:var(--charcoal);" value="${escapeHTML(it.name)}" placeholder="Enter item name..." onfocus="this.style.borderColor='var(--gold)'; this.style.background='#fff';" onblur="this.style.borderColor='#E9D5FF'; this.style.background='#F3E8FF';" onchange="updateItemField(${idx},'name',this.value)">
                <span class="mono" style="font-weight:700; white-space:nowrap;">${showINR?fmtINR(it.qty*it.rate):''}${showINR&&showUSD?' / ':''}${showUSD?'$'+fmtUSD(it.qty*(it.rateUSD||0)):''}</span>
              </div>
              <div class="line-item-grid">
                ${st.invoiceType==='service'? `
                  <div><label>Service Name</label><input type="text" value="${escapeHTML(it.fabric||'')}" placeholder="e.g. Web Design, Photography" onchange="updateItemField(${idx},'fabric',this.value)"></div>
                ` : `
                  <div><label>Size</label><select onchange="updateItemField(${idx},'size',this.value)">${sizeOptionsHTML(it.size)}</select></div>
                  <div><label>Fabric</label><input type="text" value="${escapeHTML(it.fabric||'')}" onchange="updateItemField(${idx},'fabric',this.value)"></div>
                `}
                <div><label>${codeLabel} Code</label><input type="text" value="${escapeHTML(it.hsnCode||'')}" onchange="updateItemField(${idx},'hsnCode',this.value)"></div>
                <div><label>Qty</label><input type="number" min="1" value="${it.qty}" onchange="updateItemField(${idx},'qty',parseFloat(this.value)||0)"></div>
                ${showINR? `<div><label>Rate ₹</label><input type="number" value="${it.rate||''}" onchange="updateItemField(${idx},'rate',parseFloat(this.value)||0)"></div>`:''}
                ${showUSD? `<div><label>Rate $</label><input type="number" step="0.01" value="${it.rateUSD||''}" placeholder="Enter USD rate" onchange="updateItemField(${idx},'rateUSD',parseFloat(this.value)||0)"></div>`:''}
                <div class="remove-x" onclick="removeInvoiceItem(${idx})" title="Remove item">✕</div>
              </div>
            </div>
          `).join('') : `<div style="color:var(--slate); font-size:13px; padding:12px 0;">Koi item add nahi hua abhi.</div>`}
        </div>

        <h3 style="margin-top:22px;">Notes</h3>
        <textarea placeholder="Delivery date, special instructions..." onchange="newInvoiceState.notes=this.value">${st.notes}</textarea>
      </div>

      <div class="panel">
        <h3>Currency</h3>
        <div class="currency-toggle">
          <button class="${st.currencyMode==='INR'?'active':''}" onclick="setCurrencyMode('INR')">₹ INR</button>
          <button class="${st.currencyMode==='USD'?'active':''}" onclick="setCurrencyMode('USD')">$ USD</button>
        </div>
        ${st.currencyMode==='USD'? `
        <div style="font-size:12px; color:var(--slate); margin-bottom:14px;">Using default exchange rate from Settings (1 USD = ${fmtINR(st.usdRate)}). Export invoice — GST not applicable.</div>` : ''}

        <h3 style="margin-top:18px;">Additional Charges</h3>
        <div class="field-row">
          ${showINR? `<div class="field"><label>Discount (₹)</label><input type="number" value="${st.discount}" onchange="newInvoiceState.discount=parseFloat(this.value)||0; render();"></div>` : `<div class="field"><label>Discount ($)</label><input type="number" step="0.01" value="${st.discountUSD}" onchange="newInvoiceState.discountUSD=parseFloat(this.value)||0; render();"></div>`}
          ${showINR? `<div class="field"><label>Shipping (₹)</label><input type="number" value="${st.shippingCharge}" onchange="newInvoiceState.shippingCharge=parseFloat(this.value)||0; render();"></div>` : `<div class="field"><label>Shipping ($)</label><input type="number" step="0.01" value="${st.shippingChargeUSD}" onchange="newInvoiceState.shippingChargeUSD=parseFloat(this.value)||0; render();"></div>`}
        </div>
        <div class="field-row">
          ${showINR? `<div class="field"><label>Packing Cost (₹)</label><input type="number" value="${st.otherCharge}" onchange="newInvoiceState.otherCharge=parseFloat(this.value)||0; render();"></div>` : `<div class="field"><label>Packing Cost ($)</label><input type="number" step="0.01" value="${st.otherChargeUSD}" onchange="newInvoiceState.otherChargeUSD=parseFloat(this.value)||0; render();"></div>`}
          ${showINR? `<div class="field"><label>Advance Received (₹)</label><input type="number" value="${st.advanceReceived}" onchange="newInvoiceState.advanceReceived=parseFloat(this.value)||0; render();"></div>` : `<div class="field"><label>Advance Received ($)</label><input type="number" step="0.01" value="${st.advanceReceivedUSD}" onchange="newInvoiceState.advanceReceivedUSD=parseFloat(this.value)||0; render();"></div>`}
        </div>

        <h3 style="margin-top:18px;">Summary</h3>
        ${gstApplicable? `
        <div class="field">
          <label>GST Rate (%)</label>
          <input type="number" value="${st.gstRate}" onchange="newInvoiceState.gstRate=parseFloat(this.value)||0; render();">
        </div>
        `:''}
        <div class="summary-row"><span>Items Subtotal</span><span class="mono">${showINR?fmtINR(itemsSubtotal):''}${showUSD?'$'+fmtUSD(itemsSubtotalUSD):''}</span></div>
        ${discount? `<div class="summary-row"><span>Discount</span><span class="mono">-${showINR?fmtINR(discount):''}${showUSD?'$'+fmtUSD(discountUSD):''}</span></div>`:''}
        ${shippingCharge? `<div class="summary-row"><span>Shipping</span><span class="mono">${showINR?fmtINR(shippingCharge):''}${showUSD?'$'+fmtUSD(shippingChargeUSD):''}</span></div>`:''}
        ${otherCharge? `<div class="summary-row"><span>Packing Cost</span><span class="mono">${showINR?fmtINR(otherCharge):''}${showUSD?'$'+fmtUSD(otherChargeUSD):''}</span></div>`:''}
        ${!gstApplicable? '' : sameState? `
          <div class="summary-row"><span>CGST (${(st.gstRate/2).toFixed(2)}%)</span><span class="mono">${showINR?fmtINR(gstAmt/2):''}${showUSD?'$'+fmtUSD(gstAmtUSD/2):''}</span></div>
          <div class="summary-row"><span>SGST (${(st.gstRate/2).toFixed(2)}%)</span><span class="mono">${showINR?fmtINR(gstAmt/2):''}${showUSD?'$'+fmtUSD(gstAmtUSD/2):''}</span></div>
        ` : `
          <div class="summary-row"><span>IGST (${st.gstRate}%)</span><span class="mono">${showINR?fmtINR(gstAmt):''}${showUSD?'$'+fmtUSD(gstAmtUSD):''}</span></div>
        `}
        <div class="summary-row total"><span>Total</span><span class="mono">${showINR?fmtINR(total):''}${showUSD?'$'+fmtUSD(totalUSD):''}</span></div>
        ${advanceReceived? `
          <div class="summary-row"><span>Advance Received</span><span class="mono">-${showINR?fmtINR(advanceReceived):''}${showUSD?'$'+fmtUSD(advanceReceivedUSD):''}</span></div>
          <div class="summary-row total"><span>Balance Due</span><span class="mono">${showINR?fmtINR(balanceDue):''}${showUSD?'$'+fmtUSD(balanceDueUSD):''}</span></div>
        `:''}
        <button class="btn btn-primary" style="width:100%; margin-top:18px;" onclick="finalizeInvoice()">Generate Invoice</button>
        <button class="btn btn-ghost" style="width:100%; margin-top:8px;" onclick="navigate('invoices')">Cancel</button>
      </div>
    </div>
  `;
}
function setInvoiceType(type){ newInvoiceState.invoiceType = type; render(); }
function setCurrencyMode(mode){ newInvoiceState.currencyMode = mode; render(); }
function updateInvClient(id){ newInvoiceState.clientId = id; render(); }
function addInvoiceItem(){
  const sel = document.getElementById('stylePicker');
  const id = sel.value;
  if(!id) return;
  const style = DB.styles.find(s=>s.id===id);
  newInvoiceState.items.push({
    styleId:style.id, name:style.name, qty:1, rate:styleTotalCost(style),
    rateUSD: Number(styleTotalCostUSD(style, DB.settings.usdRate).toFixed(2)),
    size:style.size||'', fabric:style.fabric||'', hsnCode:style.hsnCode||''
  });
  render();
}
function addManualInvoiceItem(){
  newInvoiceState.items.push({
    styleId:null, name:'', qty:1, rate:0, rateUSD:0,
    size:'', fabric:'', hsnCode:''
  });
  render();
}
function updateItemField(idx, field, val){ newInvoiceState.items[idx][field] = val; render(); }
function removeInvoiceItem(idx){ newInvoiceState.items.splice(idx,1); render(); }

function finalizeInvoice(){
  const st = newInvoiceState;
  if(!st.items.length){ alert('Kam se kam ek item add karein'); return; }
  const client = DB.clients.find(c=>c.id===st.clientId);
  const isExport = client.country && client.country.trim().toLowerCase()!=='india';
  const sameState = !isExport && client.state === DB.settings.bizState;
  const itemsSubtotal = st.items.reduce((s,it)=>s+it.qty*it.rate,0);
  const itemsSubtotalUSD = st.items.reduce((s,it)=>s+it.qty*itemUSDRate(it, st.usdRate),0);
  const discount = st.currencyMode==='USD' ? (Number(st.discountUSD)||0) : (Number(st.discount)||0);
  const shippingCharge = st.currencyMode==='USD' ? (Number(st.shippingChargeUSD)||0) : (Number(st.shippingCharge)||0);
  const otherCharge = st.currencyMode==='USD' ? (Number(st.otherChargeUSD)||0) : (Number(st.otherCharge)||0);
  const advanceReceived = st.currencyMode==='USD' ? (Number(st.advanceReceivedUSD)||0) : (Number(st.advanceReceived)||0);
  const subtotal = itemsSubtotal - discount + shippingCharge + otherCharge;
  const discountUSD = st.currencyMode==='USD' ? discount : (discount/st.usdRate);
  const shippingChargeUSD = st.currencyMode==='USD' ? shippingCharge : (shippingCharge/st.usdRate);
  const otherChargeUSD = st.currencyMode==='USD' ? otherCharge : (otherCharge/st.usdRate);
  const advanceReceivedUSD = st.currencyMode==='USD' ? advanceReceived : (advanceReceived/st.usdRate);
  const subtotalUSD = itemsSubtotalUSD - discountUSD + shippingChargeUSD + otherChargeUSD;
  const gstApplicable = st.currencyMode!=='USD';
  const gstAmt = gstApplicable ? subtotal * (st.gstRate/100) : 0;
  const total = subtotal + gstAmt;
  const gstAmtUSD = gstApplicable ? subtotalUSD * (st.gstRate/100) : 0;
  const totalUSD = subtotalUSD + gstAmtUSD;
  const balanceDue = total - advanceReceived;
  const balanceDueUSD = totalUSD - advanceReceivedUSD;
  const number = `${DB.settings.invoicePrefix}-${String(DB.settings.nextInvoiceNo).padStart(4,'0')}`;
  const invoiceData = {
    number,
    date: st.date,
    orderNo: st.orderNo||'',
    clientId: client.id,
    clientName: client.name,
    clientSnapshot: {...client},
    bizSnapshot: {...DB.settings},
    items: st.items,
    gstRate: gstApplicable ? st.gstRate : 0,
    gstApplicable,
    gstType: sameState? 'CGST_SGST' : 'IGST',
    isExport,
    invoiceType: st.invoiceType,
    orderType: st.orderType || 'regular',
    assignedTailorId: st.assignedTailorId || '',
    status: st.status || 'pending',
    currencyMode: st.currencyMode,
    usdRate: st.usdRate,
    itemsSubtotal, itemsSubtotalUSD,
    discount, discountUSD,
    shippingCharge, shippingChargeUSD,
    otherCharge, otherChargeUSD,
    advanceReceived, advanceReceivedUSD,
    subtotal, gstAmt, total,
    subtotalUSD, gstAmtUSD, totalUSD,
    balanceDue, balanceDueUSD,
    notes: st.notes,
    createdBy: currentUser? currentUser.email : '',
    createdAt: Date.now()
  };
  const ref = db.collection('invoices').doc();
  ref.set(invoiceData)
    .then(()=>db.collection('meta').doc('settings').set({nextInvoiceNo: DB.settings.nextInvoiceNo+1}, {merge:true}))
    .then(()=>{
      newInvoiceState = null;
      window._viewingInvoiceId = ref.id;
      navigate('viewinvoice');
    })
    .catch(err=>alert('Invoice save fail: '+err.message));
}

/* ============================= INVOICE VIEW / PRINT ============================= */
function renderInvoiceView(id){
  const inv = DB.invoices.find(i=>i.id===id);
  if(!inv) return `<div class="empty-state">Invoice nahi mila.</div>`;
  const biz = inv.bizSnapshot;
  const client = inv.clientSnapshot;
  const initials = (biz.bizName||'B').trim()[0].toUpperCase();
  const invoiceType = inv.invoiceType || 'goods';
  const currencyMode = inv.currencyMode || 'INR';
  const usdRate = inv.usdRate || biz.usdRate || 83;
  const codeLabel = invoiceType==='service' ? 'SAC' : 'HSN';
  const showINR = currencyMode!=='USD';
  const showUSD = currencyMode!=='INR';
  const hasCodes = inv.items.some(it=>it.hsnCode);
  const hasSizeFabric = inv.items.some(it=>it.size||it.fabric);

  function dual(inrVal, usdVal){
    const parts = [];
    if(showINR) parts.push(fmtINR(inrVal));
    if(showUSD) parts.push('$' + fmtUSD(usdVal!==undefined ? usdVal : inrVal/usdRate));
    return parts.join(' &nbsp;/&nbsp; ');
  }
  const gstApplicable = inv.gstApplicable!==undefined ? inv.gstApplicable : currencyMode!=='USD';
  const subtotalUSD = (inv.subtotalUSD!==undefined) ? inv.subtotalUSD : inv.items.reduce((s,it)=>s+it.qty*itemUSDRate(it, usdRate),0);
  const gstAmtUSD = (inv.gstAmtUSD!==undefined) ? inv.gstAmtUSD : (gstApplicable ? subtotalUSD*(inv.gstRate/100) : 0);
  const totalUSD = (inv.totalUSD!==undefined) ? inv.totalUSD : subtotalUSD+gstAmtUSD;

  return `
    <div class="page-header no-print">
      <div>
        <h1 class="page-title">Invoice ${escapeHTML(inv.number)}</h1>
        <p class="page-sub">${inv.date} · ${invoiceType==='service'?'Service Invoice':'Goods Invoice'}</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="navigate('invoices')">← Back</button>
        <button class="btn btn-ghost" onclick="duplicateInvoice('${inv.id}')">⧉ Duplicate</button>
        ${inv.assignedTailorId? `<button class="btn btn-ghost" onclick="sendToTailor('${inv.id}')">✂️ Send to Tailor</button>` : ''}
        <button class="btn btn-ghost" onclick="shareOrderToWhatsApp('${inv.id}')">📤 Share WhatsApp</button>
        <button class="btn btn-ghost" onclick="downloadInvoicePDF('${inv.id}')" id="pdfDownloadBtn">⬇ Download PDF</button>
        <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
      </div>
    </div>
    <div class="bill">
      <div class="bill-torn"></div>
      <div class="bill-inner">
        <div class="bill-head">
          <div>
            <p class="bill-biz-name">${escapeHTML(biz.bizName)}</p>
            <div class="bill-biz-meta">
              ${escapeHTML(biz.bizAddress||'')}<br>
              ${biz.bizPhone? 'Ph: '+escapeHTML(biz.bizPhone)+'<br>':''}
              ${biz.bizGSTIN? 'GSTIN: '+escapeHTML(biz.bizGSTIN):''}
            </div>
          </div>
          <div style="text-align:right;">
            <div class="bill-stamp" style="margin-left:auto;"><img src="${LOGO_DATA_URL}" alt="logo"></div>
            <div class="badge badge-gold" style="margin-top:8px;">${invoiceType==='service'?'SERVICE INVOICE':'TAX INVOICE (GOODS)'}</div>
            ${inv.isExport? `<div class="badge badge-slate" style="margin-top:6px;">🌍 EXPORT INVOICE</div>`:''}
          </div>
        </div>
        <div class="bill-meta-grid">
          <div>
            <div class="lbl">Bill To</div>
            <div><b>${escapeHTML(client.name)}</b></div>
            <div>${escapeHTML(client.address||'')}</div>
            <div>${client.phone? 'Ph: '+escapeHTML(client.phone):''}</div>
            <div>${client.gstin? 'GSTIN: '+escapeHTML(client.gstin):''}</div>
            <div>${escapeHTML(client.state)}${client.country? ', '+escapeHTML(client.country):''}</div>
          </div>
          <div style="text-align:right;">
            <div class="lbl">Invoice No.</div>
            <div class="mono">${escapeHTML(inv.number)}</div>
            <div class="lbl" style="margin-top:8px;">Date</div>
            <div class="mono">${inv.date}</div>
            ${inv.orderNo? `
            <div class="lbl" style="margin-top:8px;">Order No.</div>
            <div class="mono">${escapeHTML(inv.orderNo)}</div>
            ` : ''}
          </div>
        </div>
        <table>
          <thead><tr>
            <th>${invoiceType==='service'?'Service':'Style'}${hasSizeFabric? ' / Details':''}</th>
            ${hasCodes? `<th>${codeLabel}</th>`:''}
            <th>Qty</th>
            <th>Rate</th>
            <th style="text-align:right;">Amount</th>
          </tr></thead>
          <tbody>
            ${inv.items.map(it=>`
              <tr>
                <td>
                  ${escapeHTML(it.name)}
                  ${invoiceType==='service'? (it.fabric? `<div style="font-size:11px; color:var(--slate); margin-top:2px;">Service: ${escapeHTML(it.fabric)}</div>`:'') : ((it.size||it.fabric)? `<div style="font-size:11px; color:var(--slate); margin-top:2px;">${it.size?'Size: '+escapeHTML(it.size):''} ${it.size&&it.fabric?'·':''} ${it.fabric?escapeHTML(it.fabric):''}</div>`:'')}
                </td>
                ${hasCodes? `<td class="mono">${escapeHTML(it.hsnCode||'-')}</td>`:''}
                <td>${it.qty}</td>
                <td class="mono">${dual(it.rate, itemUSDRate(it, usdRate))}</td>
                <td class="mono" style="text-align:right;">${dual(it.qty*it.rate, it.qty*itemUSDRate(it, usdRate))}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="bill-totals">
          <div class="summary-row"><span>Items Subtotal</span><span class="mono">${dual(inv.itemsSubtotal!==undefined?inv.itemsSubtotal:inv.subtotal, inv.itemsSubtotalUSD!==undefined?inv.itemsSubtotalUSD:subtotalUSD)}</span></div>
          ${inv.discount? `<div class="summary-row"><span>Discount</span><span class="mono">-${dual(inv.discount, inv.discountUSD!==undefined?inv.discountUSD:inv.discount/usdRate)}</span></div>`:''}
          ${inv.shippingCharge? `<div class="summary-row"><span>Shipping</span><span class="mono">${dual(inv.shippingCharge, inv.shippingChargeUSD!==undefined?inv.shippingChargeUSD:inv.shippingCharge/usdRate)}</span></div>`:''}
          ${inv.otherCharge? `<div class="summary-row"><span>Packing Cost</span><span class="mono">${dual(inv.otherCharge, inv.otherChargeUSD!==undefined?inv.otherChargeUSD:inv.otherCharge/usdRate)}</span></div>`:''}
          ${!gstApplicable? `<div style="font-size:11.5px; color:var(--slate); margin:4px 0;">Export Invoice — GST not applicable</div>` : inv.gstType==='CGST_SGST'? `
            <div class="summary-row"><span>CGST (${(inv.gstRate/2).toFixed(2)}%)</span><span class="mono">${dual(inv.gstAmt/2, gstAmtUSD/2)}</span></div>
            <div class="summary-row"><span>SGST (${(inv.gstRate/2).toFixed(2)}%)</span><span class="mono">${dual(inv.gstAmt/2, gstAmtUSD/2)}</span></div>
          `:`
            <div class="summary-row"><span>IGST (${inv.gstRate}%)</span><span class="mono">${dual(inv.gstAmt, gstAmtUSD)}</span></div>
          `}
          <div class="summary-row total"><span>Total</span><span class="mono">${dual(inv.total, totalUSD)}</span></div>
          ${inv.advanceReceived? `
            <div class="summary-row"><span>Advance Received</span><span class="mono">-${dual(inv.advanceReceived, inv.advanceReceivedUSD!==undefined?inv.advanceReceivedUSD:inv.advanceReceived/usdRate)}</span></div>
            <div class="summary-row total"><span>Balance Due</span><span class="mono">${dual(inv.balanceDue!==undefined?inv.balanceDue:inv.total-inv.advanceReceived, inv.balanceDueUSD!==undefined?inv.balanceDueUSD:totalUSD-(inv.advanceReceivedUSD!==undefined?inv.advanceReceivedUSD:inv.advanceReceived/usdRate))}</span></div>
          `:''}
          <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--slate); font-size: 12px; color: var(--slate);">
            <div><b>Amount in Words:</b></div>
            ${showINR ? `<div style="margin-top: 4px;">₹ ${numberToWords(inv.total||0, 'INR')}</div>` : ''}
            ${showUSD ? `<div style="margin-top: 4px;">$ ${numberToWords(totalUSD||0, 'USD')}</div>` : ''}
          </div>
        </div>
        ${inv.notes? `<div style="margin-top:24px; font-size:13px; color:var(--slate);"><b>Notes:</b> ${escapeHTML(inv.notes)}</div>`:''}
        ${biz.bankDetails? `<div style="margin-top:16px; font-size:12px; color:var(--slate); white-space:pre-line;"><b>Payment Details:</b>\n${escapeHTML(biz.bankDetails)}</div>`:''}
        <div style="margin-top:30px; text-align:center; font-size:11px; color:var(--slate);">Thank you for your business</div>
      </div>
    </div>
  `;
}

function addChallanMaterial(){
  const desc = document.getElementById('m_desc').value.trim();
  const qty = document.getElementById('m_qty').value.trim();
  if(!desc || !qty){ alert('Description aur quantity dono daaliye'); return; }
  window._newChallanState.materials.push({description:desc, quantity:qty});
  document.getElementById('m_desc').value = '';
  document.getElementById('m_qty').value = '';
  render();
}

function saveChallan(){
  const st = window._newChallanState;
  if(!st.vendorId){ alert('Vendor select kariye'); return; }
  if(!st.materials.length){ alert('Kam se kam ek material add kariye'); return; }
  
  st.notes = document.getElementById('c_notes').value.trim();
  st.number = 'CHL-' + String(DB.challans.length + 1).padStart(4,'0');
  st.createdAt = new Date().getTime();
  st.returned = false;
  
  db.collection('challans').add(st)
    .then(()=>{
      alert('Challan save ho gaya!');
      navigate('challans');
      render();
    })
    .catch(err=>alert('Save fail: '+err.message));
}

/* ============================= WHATSAPP SHARE (COST HIDDEN) ============================= */
function shareOrderToWhatsApp(invoiceId){
  const inv = DB.invoices.find(i=>i.id===invoiceId);
  if(!inv) return;
  
  const client = DB.clients.find(c=>c.id===inv.clientId);
  const style = inv.items[0];
  
  // Build message WITHOUT cost
  let msg = `📦 *NEW ORDER*\n\n`;
  msg += `Order #${escapeHTML(inv.number)}\n`;
  msg += `Date: ${inv.date}\n\n`;
  
  msg += `*✨ STYLE DETAILS*\n`;
  msg += `🎨 Style: ${escapeHTML(style.name)}\n`;
  msg += `📏 Size: ${escapeHTML(style.size||'--')}\n`;
  msg += `📊 Quantity: ${style.qty}\n`;
  msg += `🧵 Fabric: ${escapeHTML(style.fabric||'--')}\n`;
  if(style.color) msg += `🌸 Color: ${escapeHTML(style.color)}\n`;
  
  // Add image URL if available
  if(style.image) {
    msg += `\n🖼️ Style Image:\n${style.image}\n`;
  }
  msg += `\n`;
  
  msg += `*👤 CLIENT INFO*\n`;
  msg += `Name: ${escapeHTML(client.name)}\n`;
  if(client.phone) msg += `Phone: ${escapeHTML(client.phone)}\n`;
  msg += `\n`;
  
  if(inv.notes) {
    msg += `*📝 SPECIAL NOTES*\n`;
    msg += `${escapeHTML(inv.notes)}\n\n`;
  }
  
  msg += `---\n`;
  msg += `Created with Corset Vogue Studio`;
  
  // Store in global variable for copy function
  window._shareMessage = msg;
  
  // Show modal with copy and share options
  showModal(`
    <h2 style="margin-bottom:16px;">Share Order to WhatsApp</h2>
    
    <div style="background:var(--ivory); padding:14px; border-radius:6px; margin-bottom:16px; border-left:3px solid var(--gold);">
      <div style="font-size:12px; color:var(--slate); margin-bottom:8px;">📋 Message Preview:</div>
      <div style="font-size:12px; font-family:monospace; white-space:pre-wrap; line-height:1.5; color:var(--ink);">
        ${escapeHTML(msg)}
      </div>
    </div>
    
    <div style="background:#FEF3C7; padding:12px; border-radius:6px; margin-bottom:16px; font-size:12px; color:#78350F;">
      ✓ <strong>Cost hidden</strong> - No pricing information included
    </div>
    
    <div style="display:flex; gap:10px;">

function copyMessageAndShare(){
  const msg = window._shareMessage;
  if(!msg) { alert('Message not found'); return; }
  
  // Copy to clipboard
  navigator.clipboard.writeText(msg)
    .then(()=>{
      closeModal();
      alert('✓ Message copied! Now paste it in WhatsApp.\n\nPaste karne ke liye Ctrl+V (Windows) ya Cmd+V (Mac) use karo.');
      
      // Try to open WhatsApp
      try {
        const encodedMsg = encodeURIComponent(msg);
        const whatsappUrl = `https://web.whatsapp.com/send?text=${encodedMsg}`;
        window.open(whatsappUrl, '_blank');
      } catch(e) {
        console.log('WhatsApp open karne mein issue');
      }
    })
    .catch(err=>{
      alert('❌ Copy failed!\n\n' + err.message + '\n\nManually select the message above aur Ctrl+C karo.');
    });
}

function numberToWords(num, currency='INR'){
  const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine'];
  const teens = ['Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
  const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
  const scales = ['', 'Thousand', 'Lakh', 'Crore'];
  
  if(num===0) return currency==='USD' ? 'Zero US Dollars' : 'Zero Rupees';
  
  let n = Math.floor(num);
  let decimals = Math.round((num - n)*100);
  let words = '';
  let scaleIdx = 0;
  
  function convertGroup(n){
    if(n===0) return '';
    if(n<10) return ones[n];
    if(n<20) return teens[n-10];
    if(n<100) return tens[Math.floor(n/10)] + (n%10>0 ? ' '+ones[n%10] : '');
    return ones[Math.floor(n/100)] + ' Hundred' + (n%100>0 ? ' '+convertGroup(n%100) : '');
  }
  
  while(n>0){
    let group = n%1000;
    if(group!==0) {
      words = convertGroup(group) + (scales[scaleIdx]?(' '+scales[scaleIdx]):'')+', '+words;
    }
    n = Math.floor(n/1000);
    scaleIdx++;
  }
  
  words = words.replace(/,\s*$/,'').trim();
  
  if(currency==='USD'){
    words += ' US Dollars';
    if(decimals>0) words += ' and '+convertGroup(decimals)+' Cents';
  } else {
    words += ' Rupees';
    if(decimals>0) words += ' and '+convertGroup(decimals)+' Paise';
  }
  
  return words.charAt(0).toUpperCase() + words.slice(1);
}

/* ============================= SEARCH ============================= */
function performSearch(query){
  if(!query.trim()){
    document.getElementById('globalSearch').value = '';
    return;
  }
  
  const q = query.toLowerCase();
  const results = [];
  
  // Search styles
  DB.styles.forEach(s=>{
    if(s.name.toLowerCase().includes(q) || (s.description||'').toLowerCase().includes(q) || (s.size||'').toLowerCase().includes(q)){
      results.push({ type:'style', id:s.id, name:s.name, desc:s.description, item:s });
    }
  });
  
  // Search invoices
  DB.invoices.forEach(i=>{
    if((i.number||'').toLowerCase().includes(q) || (i.clientName||'').toLowerCase().includes(q) || (i.date||'').includes(q)){
      results.push({ type:'invoice', id:i.id, name:i.number, desc:i.clientName+' • '+i.date, item:i });
    }
  });
  
  // Search clients
  DB.clients.forEach(c=>{
    if(c.name.toLowerCase().includes(q) || (c.phone||'').includes(q.replace(/\D/g,''))){
      results.push({ type:'client', id:c.id, name:c.name, desc:c.phone||'', item:c });
    }
  });
  
  window._searchResults = results;
  currentPage = 'search';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  closeSidebar();
  render();
}

function renderSearchResults(results){
  if(!results.length) return `<div class="empty-state" style="margin-top:40px;"><div class="big">🔍</div>Kuch nahi mila. Dubara try karein.</div>`;
  
  const grouped = { style:[], invoice:[], client:[] };
  results.forEach(r=>{ if(grouped[r.type]) grouped[r.type].push(r); });
  
  return `
    <div class="page-header">
      <div><h1 class="page-title">Search Results</h1><p class="page-sub">${results.length} matching items found</p></div>
    </div>
    ${grouped.style.length? `
      <div class="panel">
        <h3>Styles (${grouped.style.length})</h3>
        <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px;">
          ${grouped.style.map(r=>`
            <div class="card" style="cursor:pointer;" onclick="viewStyleModal('${r.id}')">
              ${r.item.image? `<img class="style-img" src="${r.item.image}">` : `<div class="style-img">No Image</div>`}
              <div class="card-body">
                <div class="card-title">${escapeHTML(r.name)}</div>
                <div class="card-desc">${escapeHTML((r.item.description||'').substring(0,50))}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `:''}
    ${grouped.invoice.length? `
      <div class="panel">
        <h3>Invoices (${grouped.invoice.length})</h3>
        <table>
          <thead><tr><th>Invoice #</th><th>Client</th><th>Date</th><th>Amount</th><th></th></tr></thead>
          <tbody>
            ${grouped.invoice.map(r=>`
              <tr onclick="viewInvoice('${r.id}')" style="cursor:pointer;">
                <td class="mono">${escapeHTML(r.item.number)}</td>
                <td>${escapeHTML(r.item.clientName)}</td>
                <td>${r.item.date}</td>
                <td class="mono">${fmtINR(r.item.total)}</td>
                <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); viewInvoice('${r.id}')">View</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `:''}
    ${grouped.client.length? `
      <div class="panel">
        <h3>Clients (${grouped.client.length})</h3>
        <div style="display:grid; gap:10px;">
          ${grouped.client.map(r=>`
            <div class="card" style="cursor:pointer;" onclick="navigate('clientdetail'); window._viewingClientId='${r.id}'; render();">
              <div class="card-body">
                <div class="card-title">${escapeHTML(r.name)}</div>
                <div class="card-desc">${r.item.phone||'No phone'}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `:''}
  `;
}

function saveSettings(){

    bizName: document.getElementById('s_name').value.trim() || 'Corset Vogue Studio',
    bizAddress: document.getElementById('s_address').value.trim(),
    bizPhone: document.getElementById('s_phone').value.trim(),
    bizState: document.getElementById('s_state').value,
    bizGSTIN: document.getElementById('s_gstin').value.trim(),
    gstRate: parseFloat(document.getElementById('s_gstrate').value)||0,
    invoicePrefix: document.getElementById('s_prefix').value.trim() || 'INV',
    usdRate: parseFloat(document.getElementById('s_usdrate').value)||83,
    tailorGroupLink: document.getElementById('s_tailorgroup').value.trim(),
    nextInvoiceNo: parseInt(document.getElementById('s_nextno').value)||1,
    bankDetails: document.getElementById('s_bank').value.trim()
  };
  db.collection('meta').doc('settings').set(data, {merge:true})
    .then(()=>alert('Settings saved!'))
    .catch(err=>alert('Save fail: '+err.message));
}
function showAddTailorForm(){
  document.getElementById('addTailorForm').style.display='block';
  document.getElementById('t_name').focus();
}
function saveTailor(){
  const name = document.getElementById('t_name').value.trim();
  const phone = document.getElementById('t_phone').value.trim().replace(/\D/g,'');
  const pass = document.getElementById('t_pass').value.trim();
  if(!name || !phone || !pass){ alert('Sab field fill karein'); return; }
  if(phone.length < 10){ alert('Valid phone number daaliye'); return; }
  
  const tailorData = { name, phone, password: pass };
  db.collection('tailors').add(tailorData)
    .then(()=>{
      alert('Tailor add ho gaya!');
      document.getElementById('addTailorForm').style.display='none';
      document.getElementById('t_name').value='';
      document.getElementById('t_phone').value='';
      document.getElementById('t_pass').value='';
      render();
    })
    .catch(err=>alert('Error: '+err.message));
}

    .then(()=>{

      render();

function exportData(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `corset-vogue-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
